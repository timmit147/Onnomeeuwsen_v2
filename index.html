<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Onno Meeuwsen</title>

<style>
body{
  margin:0;
  font-family: Inter, Helvetica, Arial, sans-serif;
  background:#f6f5f2;
  color:#111;
}

/* NAV */
nav{
  position:sticky;
  top:0;
  display:flex;
  justify-content:space-between;
  padding:14px 16px;
  background:rgba(246,245,242,0.9);
  backdrop-filter: blur(10px);
  font-size:13px;
  z-index:10;
}

/* HERO */
.hero{
  height:65vh;
  display:flex;
  flex-direction:column;
  justify-content:flex-end;
  padding:20px 16px;
}

.hero h1{
  font-size:38px;
  margin:0;
}

.hero p{
  opacity:0.6;
  max-width:320px;
}

/* SECTIONS */
section{
  padding:24px 16px;
}

h2{
  font-size:16px;
  margin-bottom:12px;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:1fr;
  gap:10px;
}

@media(min-width:600px){
  .grid{ grid-template-columns:repeat(2,1fr); }
}

@media(min-width:1000px){
  .grid{ grid-template-columns:repeat(3,1fr); }
}

.card{
  overflow:hidden;
  background:#fff;
  cursor:pointer;
}

.card img{
  width:100%;
  display:block;
  transition:0.25s ease;
}

.card img:hover{
  transform:scale(1.02);
}

/* ABOUT */
.about{
  max-width:700px;
  opacity:0.65;
  line-height:1.6;
}

/* LIGHTBOX */
.lightbox{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.92);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:999;
}

.lightbox img{
  max-width:92%;
  max-height:92%;
}
</style>
</head>

<body>

<!-- NAV -->
<nav>
  <div><strong>ONNO MEEUWSEN</strong></div>
  <div>Works About</div>
</nav>

<!-- HERO -->
<div class="hero">

<!-- ABOUT -->
<section>
<h2>About</h2>
<div class="about">
Onno Meeuwsen is a contemporary painter exploring queer intimacy,
digital identity and emotional vulnerability in online culture.
</div>
</section>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox">
  <img id="lightboxImg">
</div>

<script>
const imgs = document.querySelectorAll(".img");
const lightbox = document.getElementById("lightbox");
const lightboxImg = document.getElementById("lightboxImg");

imgs.forEach(img=>{
  img.addEventListener("click",()=>{
    lightbox.style.display="flex";
    lightboxImg.src=img.src;
  });
});

lightbox.addEventListener("click",()=>{
  lightbox.style.display="none";
});
</script>
